services:
  stashy:
    image: larsmikki/stashy:latest
    container_name: stashy
    ports:
      - "3010:3010"
    volumes:
      - stash_data:/app/data
      - stash_cache:/app/cache
      # Replace with the path to your media folder: :ro=Read-only
      - /path/to/your/media:/media:ro
    environment:
      - PORT=3010
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/api/health"]
      interval: 5m
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  stash_data:
  stash_cache:
